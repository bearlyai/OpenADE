name: Release

on:
  push:
    tags:
      - 'v*'

# Prevent concurrent releases
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-go@v5
        with:
          go-version-file: projects/openade-core/go.mod
          cache-dependency-path: projects/openade-core/go.sum

      - name: Check first-party explicit any usage
        run: node scripts/check-no-explicit-any.mjs --self-test projects scripts

      # Electron dependencies provide shared tsgo/vitest binaries for the package-level checks.
      - name: Install electron dependencies
        working-directory: projects/electron
        run: yarn install --frozen-lockfile

      # Harness — must build first, web and electron depend on it
      - name: Install harness dependencies
        working-directory: projects/harness
        run: yarn install --frozen-lockfile

      - name: Typecheck harness
        working-directory: projects/harness
        run: yarn typecheck

      - name: Test harness
        working-directory: projects/harness
        run: yarn test

      - name: Build harness
        working-directory: projects/harness
        run: yarn build

      # Core/runtime contract surface
      - name: Check OpenADE Core
        working-directory: projects/openade-core
        run: make check

      - name: Check runtime packages
        run: |
          npm --prefix projects/runtime-protocol run check
          npm --prefix projects/runtime-client run check
          npm --prefix projects/runtime-node run check
          npm --prefix projects/runtime run check

      - name: Check OpenADE product packages
        run: |
          npm --prefix projects/openade-client run check
          npm --prefix projects/openade-module run check

      # Web
      - name: Install web dependencies
        working-directory: projects/web
        run: yarn install --frozen-lockfile

      - name: Install Playwright Chromium
        working-directory: projects/web
        run: npx playwright install chromium --with-deps

      - name: Check web
        working-directory: projects/web
        run: yarn check

      - name: Smoke web remote route
        working-directory: projects/web
        run: yarn smoke:remote-route

      # Mobile shared shell
      - name: Install mobile dependencies
        working-directory: projects/mobile
        run: yarn install --frozen-lockfile

      - name: Build mobile shared shell
        working-directory: projects/mobile
        run: yarn build

      # Electron
      - name: Check electron
        working-directory: projects/electron
        run: yarn check

  release-macos:
    needs: validate
    runs-on: macos-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set version from tag
        working-directory: projects/electron
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          npm pkg set version=$VERSION

      # Build harness (dist/ is gitignored, must exist before web install copies it)
      - name: Install harness dependencies
        working-directory: projects/harness
        run: yarn install --frozen-lockfile

      - name: Build harness
        working-directory: projects/harness
        run: yarn build

      # Build web UI first
      - name: Install web dependencies
        working-directory: projects/web
        run: yarn install --frozen-lockfile

      - name: Build web UI
        working-directory: projects/web
        run: yarn build

      # Build electron
      - name: Install electron dependencies
        working-directory: projects/electron
        run: yarn install --frozen-lockfile

      - name: Build electron
        working-directory: projects/electron
        run: yarn build

      # Copy web build into electron
      - name: Bundle web UI into electron
        run: cp -r projects/web/dist projects/electron/dist/web

      - name: Build signed artifacts (no publish)
        working-directory: projects/electron
        env:
          CSC_LINK: ${{ secrets.MACOS_SIGNING_CERT_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_SIGNING_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_NOTARIZATION_EMAIL }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac --universal --publish never

      - name: Smoke test the signed artifact
        working-directory: projects/electron
        env:
          OPENADE_SMOKE_BINARY: ${{ github.workspace }}/projects/electron/dist/electron/mac-universal/OpenADE.app/Contents/MacOS/OpenADE
        run: yarn test:smoke

      - name: Build & Publish
        working-directory: projects/electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MACOS_SIGNING_CERT_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_SIGNING_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_NOTARIZATION_EMAIL }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac --universal --publish always

  release-windows:
    needs: validate
    runs-on: windows-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set version from tag
        working-directory: projects/electron
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          npm pkg set version=$VERSION

      # Build harness (dist/ is gitignored, must exist before web install copies it)
      - name: Install harness dependencies
        working-directory: projects/harness
        run: yarn install --frozen-lockfile

      - name: Build harness
        working-directory: projects/harness
        run: yarn build

      # Build web UI first
      - name: Install web dependencies
        working-directory: projects/web
        run: yarn install --frozen-lockfile

      - name: Build web UI
        working-directory: projects/web
        run: yarn build

      # Build electron
      - name: Install electron dependencies
        working-directory: projects/electron
        run: yarn install --frozen-lockfile

      - name: Build electron
        working-directory: projects/electron
        run: yarn build

      # Copy web build into electron
      - name: Bundle web UI into electron
        shell: bash
        run: cp -r projects/web/dist projects/electron/dist/web

      - name: Build signed artifacts (no publish)
        working-directory: projects/electron
        env:
          AZURE_TENANT_ID: ${{ secrets.WINDOWS_AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.WINDOWS_AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.WINDOWS_AZURE_CLIENT_SECRET }}
        run: npx electron-builder --win --x64 --publish never

      - name: Smoke test the signed artifact
        working-directory: projects/electron
        shell: bash
        env:
          OPENADE_SMOKE_BINARY: ${{ github.workspace }}/projects/electron/dist/electron/win-unpacked/OpenADE.exe
        run: yarn test:smoke

      - name: Build & Publish
        working-directory: projects/electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AZURE_TENANT_ID: ${{ secrets.WINDOWS_AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.WINDOWS_AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.WINDOWS_AZURE_CLIENT_SECRET }}
        run: npx electron-builder --win --x64 --publish always

  release-linux:
    needs: validate
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set version from tag
        working-directory: projects/electron
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          npm pkg set version=$VERSION

      # Build harness (dist/ is gitignored, must exist before web install copies it)
      - name: Install harness dependencies
        working-directory: projects/harness
        run: yarn install --frozen-lockfile

      - name: Build harness
        working-directory: projects/harness
        run: yarn build

      # Build web UI first
      - name: Install web dependencies
        working-directory: projects/web
        run: yarn install --frozen-lockfile

      - name: Build web UI
        working-directory: projects/web
        run: yarn build

      # Build electron
      - name: Install electron dependencies
        working-directory: projects/electron
        run: yarn install --frozen-lockfile

      - name: Build electron
        working-directory: projects/electron
        run: yarn build

      # Copy web build into electron
      - name: Bundle web UI into electron
        run: cp -r projects/web/dist projects/electron/dist/web

      - name: Build artifacts (no publish)
        working-directory: projects/electron
        run: npx electron-builder --linux --x64 --arm64 --publish never

      - name: Smoke test the artifact
        working-directory: projects/electron
        env:
          OPENADE_SMOKE_BINARY: ${{ github.workspace }}/projects/electron/dist/electron/linux-unpacked/openade
        run: |
          # ubuntu-latest has no display server; xvfb-run gives Electron a virtual one.
          xvfb-run --auto-servernum --server-args='-screen 0 1280x1024x24' yarn test:smoke

      - name: Build & Publish
        working-directory: projects/electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --linux --x64 --arm64 --publish always
